name: Setup SukiSU
description: Download and configure SukiSU Ultra with version tracking
inputs:
  use_latest_commits:
    description: 'Use the latest commit on the branch instead of the pinned commit'
    required: false
    default: true

runs:
  using: composite
  steps:
    - name: Download SukiSU Ultra
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail

        SUKISU_BRANCH="builtin"

        if [ "${{ inputs.use_latest_commits }}" = "true" ]; then
          echo "Using latest SukiSU Ultra from branch: $SUKISU_BRANCH"
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s "$SUKISU_BRANCH"
        else
          COMMITS_JSON="${{ github.workspace }}/.github/config/commits.json"
          SUKISU_SETUP_COMMIT=$(jq -er '.sukisu.main' "$COMMITS_JSON")
          echo "Using pinned SukiSU commit: $SUKISU_SETUP_COMMIT"
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s "$SUKISU_BRANCH"
          git -C KernelSU/kernel fetch --depth=50 origin "$SUKISU_SETUP_COMMIT"
          git -C KernelSU/kernel checkout "$SUKISU_SETUP_COMMIT"
        fi

#        cd KernelSU/kernel
        
#        COMMITS_COUNT=$(/usr/bin/git rev-list --count HEAD)
#        BASE_VERSION=30000
#        KSU_VERSION=$(expr $COMMITS_COUNT "+" $BASE_VERSION)
#        sed -i "s/^KSU_VERSION_FALLBACK := 1$/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" Kbuild

#        KSU_GIT_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")"
#        sed -i "s/^KSU_VERSION_TAG_FALLBACK := v0.0.1$/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" Kbuild

    - name: Extract KSU Version Info
      id: ksu-version
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/KernelSU
      run: |
        set -euo pipefail
        KSU_GIT_VERSION=$(git rev-list --count HEAD 2>/dev/null || echo "unknown")
        KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "no-tag")
        KSU_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")

        echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
        echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV
        echo "KSU_GIT_VERSION=$KSU_GIT_VERSION" >> $GITHUB_ENV

        echo "SukiSU commit: $KSU_COMMIT"
        echo "SukiSU tag: $KSU_GIT_TAG"
        echo "SukiSU commit count: $KSU_GIT_VERSION"


    - name: Enable Kernel Configs
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_KSU=y
          CONFIG_KPM=y
