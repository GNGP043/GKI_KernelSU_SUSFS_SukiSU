name: Setup SukiSU
description: Download and configure SukiSU Ultra and force inject SUSFS support
inputs:
  use_latest_commits:
    description: 'Use the latest commit on the branch instead of the pinned commit'
    required: false
    default: true

runs:
  using: composite
  steps:
    - name: Download SukiSU Ultra
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail

        SUKISU_BRANCH="main"

        # 1. 執行原有的 SukiSU 官方設定
        if [ "${{ inputs.use_latest_commits }}" = "true" ]; then
          echo "Using latest SukiSU Ultra from branch: $SUKISU_BRANCH"
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s "$SUKISU_BRANCH"
        else
          COMMITS_JSON="${{ github.workspace }}/.github/config/commits.json"
          SUKISU_SETUP_COMMIT=$(jq -er '.sukisu.main' "$COMMITS_JSON")
          echo "Using pinned SukiSU commit: $SUKISU_SETUP_COMMIT"
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s "$SUKISU_BRANCH"
          git -C KernelSU fetch --depth=50 origin "$SUKISU_SETUP_COMMIT"
          git -C KernelSU checkout "$SUKISU_SETUP_COMMIT"
        fi

        # 2. 核心修正：強制注入 SUSFS 對應 KSU 的補丁
        echo "=== [CRITICAL] 開始為 SukiSU 注入 SUSFS 銜接補丁 ==="
        
        # 進入剛剛下載好的 KernelSU 目錄
        cd KernelSU

        # 從專門為 KSU 提供 SUSFS 支持的開源倉庫下載補丁 (這裡使用 6.1 內核通用的 KSU SUSFS 補丁)
        # 該補丁會在 KSU 的核心文件中加入對 susfs_is_vfs_su_rejected 等函數的調用
        curl -LSs https://raw.githubusercontent.com/Gany666/susfs4ksu/main/kernel_patches/50_add_susfs_in_gki-6.1.patch -o ksu_susfs.patch
        
        # 執行打補丁。因為 SukiSU 結構完全基於 KSU，因此代碼位置是一模一樣的
        if patch -p1 < ksu_susfs.patch; then
          echo "🟢 SukiSU 成功與 SUSFS 補丁對接！"
        else
          echo "🟡 標準補丁失敗，嘗試 alternative 補丁..."
          # 如果上一個補丁因為 SukiSU 特有代碼衝突，則嘗試通用型核心 Hook 補丁
          curl -LSs https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/KernelSU/ksu.patch -o ksu_alt.patch
          if patch -p1 < ksu_alt.patch; then
            echo "🟢 替代補丁成功嵌入！"
          else
            echo "❌ 警告：KSU 端的 SUSFS 補丁注入失敗，可能需要確認 SukiSU 目前的代碼結構。"
            exit 1
          fi
        fi

    - name: Extract KSU Version Info
      id: ksu-version
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/KernelSU
      run: |
        set -euo pipefail
        KSU_GIT_VERSION=$(git rev-list --count HEAD 2>/dev/null || echo "unknown")
        KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "no-tag")
        KSU_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")

        echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
        echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV
        echo "KSU_GIT_VERSION=$KSU_GIT_VERSION" >> $GITHUB_ENV

        echo "SukiSU commit: $KSU_COMMIT"
        echo "SukiSU tag: $KSU_GIT_TAG"
        echo "SukiSU commit count: $KSU_GIT_VERSION"

    - name: Enable Kernel Configs
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_KSU=y
          CONFIG_SUKISU=y
          CONFIG_KPM=y
          CONFIG_KSU_SUSFS=y
